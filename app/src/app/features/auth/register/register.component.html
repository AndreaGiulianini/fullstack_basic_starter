<div class="auth-container">
  <div class="auth-card">
    <h1>Create Account</h1>

    @if (authService.error()) {
      <div class="error-message">
        {{ authService.error() }}
      </div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Name (optional)</label>
        <input
          type="text"
          id="name"
          formControlName="name"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          [class.invalid]="
            registerForm.get('email')?.invalid &&
            registerForm.get('email')?.touched
          "
        />
        @if (getErrorMessage("email")) {
          <span class="field-error">{{ getErrorMessage("email") }}</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          [class.invalid]="
            registerForm.get('password')?.invalid &&
            registerForm.get('password')?.touched
          "
        />
        @if (getErrorMessage("password")) {
          <span class="field-error">{{ getErrorMessage("password") }}</span>
        }
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          [class.invalid]="passwordMismatch"
        />
        @if (passwordMismatch) {
          <span class="field-error">Passwords do not match</span>
        }
      </div>

      <button
        type="submit"
        [disabled]="registerForm.invalid || authService.loading()"
        class="btn-primary"
      >
        @if (authService.loading()) {
          <span>Creating account...</span>
        } @else {
          <span>Register</span>
        }
      </button>
    </form>

    <div class="auth-links">
      <p>Already have an account? <a routerLink="/login">Login</a></p>
    </div>
  </div>
</div>
